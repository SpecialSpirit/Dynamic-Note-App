        <aside class="sidebar">
            <button id="sidebar-button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M4 18L20 18" stroke-width="2" stroke-linecap="round" />

                    <path d="M4 6L20 6" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
            <div class="sidebar-time">
                <time class="sidebar-time-clock" id="localTime">00:00</time>
            </div>
            <nav class="category-nav">
                <ul class="category-list">
                    <li class="category-item active">
                        <button class="category-btn">
                            <h5 class="card-title">NOTE HEADER</h5>

            </nav>
            <div class="sidebar-bottom">
                <button id="category-add">
                    <span>New Note</span>
                </button>
            </div>
        </aside>
        <div class="content">
            <section class="card">
                <article class="card-content">
                    <h5 class="card-title">NOTE</h5>
                    <p class="card-text">Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>

                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                            fill="var(--primary-a30)">

                            fill="var(--primary-a30)">
                            <path
                                d="m336-280 144-144 144 144 56-56-144-144 144-144-56-56-144 144-144-144-56 56 144 144-144 144 56 56ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Z" />
                        </svg></button>
                </article>
            </section>
        </div>
    </div>
    <div class="model">
        <div class="model-content">
            <h5 class="model-title">New Note</h5>
            <form action="#" method="get">
                <textarea class="model-textarea" placeholder="Write your note here..."></textarea>
                <div class="model-actions">
                    <button class="model-cancel">Cancel</button>
                    <button class="model-save">Save</button>
                </div>
            </form>
        </div>
    </div>
</body>
